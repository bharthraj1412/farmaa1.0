name: farmaa_mobile
description: Farmaa – From Farm to Future. A digital marketplace connecting farmers and buyers for all grains.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Navigation
  go_router: ^13.2.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  firebase_messaging: ^14.7.20

  # Charts
  fl_chart: ^0.68.0

  # Payment
  razorpay_flutter: ^1.4.1

  # Images
  cached_network_image: ^3.4.0
  image_picker: ^1.1.1

  # Animations
  lottie: ^3.1.0
  animate_do: ^3.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  badges: ^3.1.2
  dotted_border: ^2.1.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.2.2


  # Localizations
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.12.0
  google_sign_in: ^6.2.1
  
  # Environment configuration
  flutter_dotenv: ^5.1.0

dependency_overrides:
  path_provider_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.3.11
  build_runner: ^2.4.9
  json_serializable: ^6.7.1
  json_annotation: ^4.9.0
  integration_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/images/
